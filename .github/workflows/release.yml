name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build release binary
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\usnjrnl-forensic.exe" -DestinationPath "usnjrnl-forensic-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"

      - name: Build MSI
        shell: pwsh
        run: |
          cargo install cargo-wix
          cargo wix init --force
          cargo wix --no-build --nocapture --output "usnjrnl-forensic-${{ github.ref_name }}-x86_64-pc-windows-msvc.msi"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: |
            usnjrnl-forensic-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
            usnjrnl-forensic-${{ github.ref_name }}-x86_64-pc-windows-msvc.msi
